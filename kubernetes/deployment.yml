apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-cicd-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-cicd-app
  template:
    metadata:
      labels:
        app: kube-cicd-app
    spec:
      containers:
        - name: kube-cicd-app
          image: kailashbadu/kube-cicd-app:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "5m"
              memory: "10Mi"
            limits:
              cpu: "30m"
              memory: "64Mi"
